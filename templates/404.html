{% extends "base.html" %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 150px); padding: 20px;">
    <div class="text-center">
        <div class="bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center mx-auto mb-4"
            style="width: 120px; height: 120px;">
            <span class="material-symbols-outlined text-primary" style="font-size: 64px;">sentiment_dissatisfied</span>
        </div>
        <h1 class="display-1 fw-bold text-secondary mb-2" style="letter-spacing: -2px;">404</h1>
        <h3 class="fw-bold text-dark mb-3">Page Not Found</h3>
        <p class="text-muted mb-4 lead" style="max-width: 500px; margin: 0 auto;">Oops! The page you are looking for
            does not exist, has been removed, or is temporarily unavailable.</p>
        <a href="{{ url_for('index') }}"
            class="btn btn-primary px-4 py-2 rounded-pill fw-bold shadow-sm d-inline-flex align-items-center gap-2">
            <span class="material-symbols-outlined" style="font-size: 20px;">home</span> Back to Home
        </a>
    </div>
</div>
{% endblock %}
