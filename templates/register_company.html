{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-center py-5">
    <div class="card" style="width: 100%; max-width: 600px; padding: 40px; border-radius: var(--radius-lg);">
        <h2 class="text-center mb-4 text-secondary">Create Company Account</h2>
        <p class="text-center text-muted mb-4 small">Your account will be pending Admin approval.</p>

        <form method="POST" action="{{ url_for('auth.register_company') }}" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-4">
                <label class="form-label text-muted small fw-bold">Company Name <span
                        class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-muted">
                        <i class="bi bi-building"></i>
                    </span>
                    <input type="text" class="form-control input-field border-start-0 ps-0" name="company_name"
                        placeholder="Acme Corp" required>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-6 mb-3 mb-md-0">
                    <label class="form-label text-muted small fw-bold">HR Contact Name <span
                            class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-muted">
                            <i class="bi bi-person"></i>
                        </span>
                        <input type="text" class="form-control input-field border-start-0 ps-0" name="hr_name"
                            placeholder="HR Manager Name" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-muted small fw-bold">Company Website</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-muted">
                            <i class="bi bi-globe"></i>
                        </span>
                        <input type="url" class="form-control input-field border-start-0 ps-0" name="website"
                            placeholder="https://example.com">
                    </div>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-6 mb-3 mb-md-0">
                    <label class="form-label text-muted small fw-bold">HR Email (Login ID) <span
                            class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-muted">
                            <i class="bi bi-envelope"></i>
                        </span>
                        <input type="email" class="form-control input-field border-start-0 ps-0" name="email"
                            placeholder="hr@acme.com" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-muted small fw-bold">Password <span
                            class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-muted">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password" class="form-control input-field border-start-0 ps-0" name="password"
                            placeholder="Create a password" required>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label text-muted small fw-bold">HR Phone Number</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-muted">
                        <i class="bi bi-telephone"></i>
                    </span>
                    <input type="tel" class="form-control input-field border-start-0 ps-0" name="phone"
                        placeholder="Contact number">
                </div>
            </div>

            <hr class="my-4 border-light">
            <h6 class="fw-bold mb-3 text-secondary d-flex align-items-center gap-2">
                <span class="material-symbols-outlined" style="font-size: 18px;">info</span> Company Details
            </h6>

            <div class="mb-4">
                <label class="form-label text-muted small fw-bold">Company Description</label>
                <textarea class="form-control border-light shadow-none custom-textarea" name="description" rows="4"
                    placeholder="Briefly describe your company, culture, and what you do..."></textarea>
            </div>

            <div class="mb-4">
                <label class="form-label text-muted small fw-bold">Company Logo</label>
                <div class="d-flex align-items-center gap-3 bg-light p-3 rounded-3 border border-dashed">
                    <div class="bg-white rounded-circle d-flex mx-2 align-items-center justify-content-center shadow-sm"
                        style="width: 40px; height: 40px;">
                        <span class="material-symbols-outlined text-primary" style="font-size: 20px;">image</span>
                    </div>
                    <div class="flex-grow-1">
                        <input type="file" class="form-control border-0 bg-transparent shadow-none" name="logo"
                            accept="image/png, image/jpeg" style="padding: 0;">
                        <div class="form-text text-muted small m-0 mt-1">Accepted formats: PNG, JPG. Max size: 2MB</div>
                    </div>
                </div>
            </div>

            <div class="d-grid mt-5">
                <button type="submit"
                    class="btn btn-primary py-3 d-flex align-items-center justify-content-center gap-2 shadow-sm"
                    style="background: var(--secondary); border: none; font-weight: 600; border-radius: 8px;">
                    Register Company <span class="material-symbols-outlined"
                        style="font-size: 18px;">arrow_forward</span>
                </button>
            </div>

            <div class="text-center mt-4 pt-3 border-top">
                <span class="text-muted">Already registered?</span>
                <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-bold ms-1"
                    style="color: var(--primary);">Login</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
